apis:
  - aid: acm:acm-search-api
    name: ACM Digital Library Search API
    description: >-
      The ACM Digital Library search endpoint allows programmatic querying of computing literature across ACM's
      full publication corpus. Queries are issued against the doSearch action endpoint with parameters for
      full-text search terms, pagination (startPage, pageSize), and scope expansion. The endpoint returns
      HTML responses reflecting search results and supports access to ACM conference proceedings, journals,
      magazines, and the broader ACM Guide to Computing Literature. Institutional or ACM member authentication
      unlocks access to full-text content beyond open-access articles.
    humanURL: https://dl.acm.org/search/
    baseURL: https://dl.acm.org
    properties:
      - type: Documentation
        url: https://dl.acm.org/search/
      - type: Authentication
        url: https://libraries.acm.org/subscriptions-access/authentication
    tags:
      - Bibliographic Records
      - Computing
      - Conference Proceedings
      - Full-Text Search
      - Journals
      - Metadata
      - Publications
      - Research
      - Search

  - aid: acm:acm-content-retrieval-api
    name: ACM Digital Library Content Retrieval API
    description: >-
      Individual publications, conference papers, and journal articles in the ACM Digital Library are
      accessible via persistent DOI-based URLs at dl.acm.org/doi/{doi}. ACM maintains DOI registration
      through CrossRef and operates its own DOI resolution service. As of January 2026, all ACM-published
      content is open access, making bibliographic metadata and many full-text articles freely available.
      The endpoint supports retrieval of article abstracts, author information, affiliation data, citation
      counts, and full-text PDF downloads where permitted.
    humanURL: https://dl.acm.org/
    baseURL: https://dl.acm.org
    properties:
      - type: Documentation
        url: https://libraries.acm.org/digital-library/platform-and-features
      - type: OpenAccess
        url: https://dl.acm.org/openaccess
      - type: Authentication
        url: https://libraries.acm.org/subscriptions-access/authentication
    tags:
      - Articles
      - Content
      - DOI
      - Full-Text
      - Metadata
      - Open Access
      - Publications
      - Retrieval

  - aid: acm:acm-citation-export-api
    name: ACM Digital Library Citation Export API
    description: >-
      The ACM Digital Library provides citation export functionality supporting BibTeX, EndNote, and ACM
      Reference format downloads for individual articles and bulk search result sets. Users can export
      individual citations from article pages or export all results from a search query. The export
      interface is accessible through the web UI and supports selecting individual items or all search
      results. BibTeX exports are compatible with reference managers including Mendeley and Zotero.
      Premium subscribers have access to enhanced citation tools and bulk export capabilities.
    humanURL: https://libraries.acm.org/training-resources/new-dl-features/citation-functions
    baseURL: https://dl.acm.org
    properties:
      - type: Documentation
        url: https://libraries.acm.org/training-resources/new-dl-features/citation-functions
      - type: ExportGuide
        url: https://libraries.acm.org/training-resources/new-dl-features/exporting-citations
    tags:
      - BibTeX
      - Citations
      - EndNote
      - Export
      - Metadata
      - Reference Management
      - Scholarly

