aid: acm
name: ACM Digital Library
kind: company
description: >-
  The ACM Digital Library is the world's most comprehensive collection of full-text articles and bibliographic
  literature covering computing and information technology. Published by the Association for Computing Machinery
  (ACM), it provides access to journals, conference proceedings, magazines, newsletters, and technical reports
  spanning the complete history of ACM publications. As of January 2026, the ACM Digital Library is fully open
  access, offering free basic access to its entire corpus of computing research. Programmatic access is
  available through web-based search endpoints, DOI-based content retrieval, citation export (BibTeX, EndNoteL,
  ACM Ref), and Premium tier bulk download and research analytics capabilities. The library also provides the
  ACM Guide to Computing Literature, a comprehensive bibliographic database extending beyond ACM publications
  to cover the broader computing literature.
url: https://raw.githubusercontent.com/api-evangelist/acm/refs/heads/main/apis.yml
